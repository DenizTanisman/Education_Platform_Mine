slug: rag
title: "RAG ile Doküman Tabanlı Asistan"
description: |
  Retrieval-Augmented Generation (RAG): büyük dokümanları küçük parçalara
  bölme (chunking with overlap), embedding ile vector index oluşturma,
  query'e benzer chunk'ları cosine similarity ile çekme, LLM'e bu chunk'ları
  context olarak verme. Citations ile şeffaf cevap üretme. M6'nın ad-hoc
  semantic memory'sini production-ready RAG sistemine evrimleştiriyoruz.
