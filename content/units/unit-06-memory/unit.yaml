order: 6
slug: memory
title: "Memory ile Stateful Agent"
description: |
  M5'in stateless agent'ını üç katmanlı belleğe genişletiyoruz:
  konuşma geçmişi (multi-turn messages), kullanıcı tercihleri (key-value
  facts), ve embedding-based semantic memory (cosine similarity arama).
  MemoryStore class'ı file-based JSON ile kalıcı saklama yapıyor. LLM,
  remember_fact / recall_fact / search_memory tool'ları üzerinden kendi
  belleğine erişiyor. text-embedding-3-small ile vektörleme, asyncio'lu
  agent loop, multi-turn conversation persistence.
tags:
