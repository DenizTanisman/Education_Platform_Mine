title: "Capstone — Mini Jarvis"
description: |
  Önceki 7 modülün hepsini tek projede birleştiren capstone modülü.
  Mini Jarvis: agent loop (M5) + memory (M6) + RAG (M7) + structured
  output (M4) + async parallel (M3) + retry/error handling (M2) +
  SQLite (M1) + disiplinli kod (M0). 6 tool'lu kişisel asistan:
  remember_fact, recall_fact, search_memory, add_task, list_tasks,
  search_documents. JarvisStore üç alt-store (memory, rag, tasks)
  içeren composite. Final modül — kursun ustalık seviyesi.
