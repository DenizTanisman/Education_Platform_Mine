slug: llm-sdk
title: "LLM SDK ile Doğrudan Bağlantı"
description: |
  OpenAI Python SDK ile ilk LLM çağrısı. Sync vs async kullanım, mesaj
  rolleri (system/user/assistant), model parametreleri (temperature,
  max_tokens), AsyncOpenAI ile asyncio.gather kullanarak paralel çağrı.
  Modülün sonunda öğrenci 10 başlığı paralel olarak özetleyen ve
  süresini ölçen bir araç yazar. Anthropic SDK ile karşılaştırma
  kutucukları paralel olarak verilir.
