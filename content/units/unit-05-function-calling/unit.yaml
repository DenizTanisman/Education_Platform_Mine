slug: function-calling
title: "Function Calling ile Tool Kullanımı"
description: |
  OpenAI tool calling ile LLM'e Python fonksiyonlarını bir araç (tool)
  olarak verme. Pydantic schema'larıyla tool input'u tanımlama, Tool
  registry pattern'i, agent loop'u (tool çağrısı → sonuç → final cevap),
  paralel tool execution, max_iters güvenlik, hata sarmalama. Modülün
  sonunda öğrenci hava durumu ve hesap araçları olan bir CLI asistan
  yazar — gerçek anlamda agent'ın başlangıcı.
