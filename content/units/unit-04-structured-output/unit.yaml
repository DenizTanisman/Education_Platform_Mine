slug: structured-output
title: "Structured Output ile Pydantic"
description: |
  Pydantic v2 ile veri sınıfları (BaseModel), Field constraint'leri (ge/le,
  default_factory, description), Enum kullanımı, OpenAI structured outputs
  (chat.completions.parse + response_format), JSON Schema otomatik üretimi,
  ve LLM cevabını tip-güvenli Pydantic instance olarak alma. Modülün
  sonunda öğrenci kullanıcı yorumlarından structured bilgi çıkaran bir
  araç yazar (rating, sentiment, category, red_flags).
