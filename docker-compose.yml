# IAU AI Platform — production-ish compose stack.
#
# Services:
#   - caddy      public_net only        reverse-proxy + TLS termination
#   - app        public_net + internal  Next.js (Faz 5+)
#   - runner     internal_net only      sandbox orchestrator (Faz 4)
#   - postgres   internal_net only      Postgres 16 (loopback exposed for tooling)
#
# Volumes:
#   - postgres_data, caddy_data, caddy_config — service state
#
# Bind mounts:
#   - ./content:/srv/content:ro    student-facing content layout (read-only)
#   - ./app/public/pdfs:/srv/pdfs  ingested PDFs served via /pdfs/* by app
#   - /var/run/docker.sock         runner spawns iau-sandbox containers via the host daemon

services:
  caddy:
    image: caddy:2-alpine
    container_name: iau_caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      # PDFs are served directly by Caddy under /pdfs/* — see Caddyfile.
      - ./app/public/pdfs:/srv/pdfs:ro
    networks:
      - public_net
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    image: iau-app:latest
    container_name: iau_app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      RUNNER_URL: ${RUNNER_URL}
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET}
    volumes:
      # Mount content/units read-only so the app can serve education PDFs
      # and look up tests/test_runner.py for runner dispatch (currently the
      # runner reads them directly; this mount is for forward-compat).
      - ./content/units:/srv/content/units:ro
      - ./app/public/pdfs:/app/public/pdfs:ro
    networks:
      - public_net
      - internal_net
    depends_on:
      postgres:
        condition: service_healthy
      runner:
        condition: service_started

  runner:
    build:
      context: .
      dockerfile: runner/Dockerfile
    image: iau-runner:latest
    container_name: iau_runner
    restart: unless-stopped
    environment:
      RUNNER_PORT: 4000
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      # Same absolute path as the host so `docker run -v` arguments built
      # by runner-core resolve on the daemon's filesystem. See volumes:
      # the host repo root is bind-mounted at this same path.
      REPO_ROOT: ${PWD}
    volumes:
      # Same-path bind so paths inside the runner == paths on the host.
      # Without this, `docker run -v /content/units/...` fails with
      # "mounts denied: ... not shared from the host".
      - ${PWD}:${PWD}:ro
      # /tmp:/tmp lets the runner extract submission ZIPs to /tmp/sub-<uuid>
      # and the sandbox bind-mount it back from the host's /tmp.
      - /tmp:/tmp
      # Bind the host docker socket so the runner can launch iau-sandbox
      # containers. The host must have iau-sandbox:latest pre-built (see
      # `make sandbox`).
      - /var/run/docker.sock:/var/run/docker.sock
    # docker.sock is owned by root:docker on Linux; macOS Docker Desktop
    # is more permissive. Adding gid 0 is the simplest portable fix; we
    # are aware it loosens the runner's user model — see READINESS.md.
    group_add:
      - "0"
    networks:
      - internal_net
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: iau_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal_net
    # Loopback host exposure for prisma studio + host-side ingest. Other
    # containers still resolve postgres via `postgres:5432`. Host port 5433
    # avoids a typical system postgres on 5432.
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  public_net:
    driver: bridge
  # Segmented but not `internal: true`: caddy still cannot reach postgres
  # (it's only on public_net), but one-off tooling containers attached to
  # internal_net can fetch their dependencies.
  internal_net:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
