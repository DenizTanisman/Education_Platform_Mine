# IAU AI Platform — Faz 1.2 compose skeleton
#
# Services (per 01_BUILD_PLAN.md §1.2):
#   - caddy      public_net only        (reverse proxy, real image)
#   - app        public_net + internal  (placeholder nginx:alpine, later Next.js)
#   - runner     internal_net only      (placeholder nginx:alpine, later Node runner)
#   - postgres   internal_net only      (real image, real creds via .env)
#
# Networks:
#   - public_net    bridge, reachable from host
#   - internal_net  bridge with `internal: true` (no egress to the outside)
#
# This file stands up the stack with placeholder images so we can validate
# compose config + basic connectivity before writing any real service code.

services:
  caddy:
    image: caddy:2-alpine
    container_name: iau_caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public_net
    depends_on:
      - app

  app:
    image: nginx:alpine
    container_name: iau_app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      RUNNER_URL: ${RUNNER_URL}
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET}
    networks:
      - public_net
      - internal_net
    depends_on:
      postgres:
        condition: service_healthy
      runner:
        condition: service_started

  runner:
    image: nginx:alpine
    container_name: iau_runner
    restart: unless-stopped
    environment:
      RUNNER_SHARED_SECRET: ${RUNNER_SHARED_SECRET}
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - internal_net
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: iau_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal_net
    # No host port published — postgres stays on internal_net only. Prisma
    # migrations + studio run via `make migrate` / `make studio`, which spin
    # up a one-off node container joined to the same compose network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  public_net:
    driver: bridge
  # `internal_net` provides segmentation (Caddy never sees postgres) but is
  # NOT marked `internal: true` so one-off tooling containers (prisma migrate,
  # ingest scripts) joined to this network can still reach package registries
  # and prisma's binary mirror at run time.
  internal_net:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
